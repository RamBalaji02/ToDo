<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToDo App</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- TITLE -->
    <h1 class="title">📝 ToDo App</h1>

    <!-- INPUT BOX -->
    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter a task...">
        <button class="add-btn" onclick="addTask()">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <!-- FILTER BUTTONS -->
    <div class="filters">
        <button class="active" onclick="filterTasks('all',this)">All</button>
        <button onclick="filterTasks('active',this)">Active</button>
        <button onclick="filterTasks('completed',this)">Completed</button>
    </div>

    <!-- TASK LIST -->
    <ul id="taskList"></ul>

    <!-- FOOTER -->
    <div class="footer">
        <span id="taskCount">0 Tasks Left</span>
        <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
